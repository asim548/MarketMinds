# Optional Blueprint. Dashboard-only users: paste the buildCommand line into Render Build Command.
services:
  - type: web
    runtime: python
    buildCommand: pip install --upgrade pip && pip install torch==2.3.1 torchvision==0.18.1 --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
