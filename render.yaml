# Optional Blueprint. Dashboard-only users: paste the buildCommand line into Render Build Command.
services:
  - type: web
    runtime: python
    buildCommand: bash scripts/render-pip-install.sh
    # Must bind $PORT (avoid `python app.py` in the dashboard — Render probes the port before FP finishes loading).
    startCommand: gunicorn --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 --bind 0.0.0.0:$PORT app:app
